# Base configuration shared by all environments.
# Environment-specific files (development.yaml, production.yaml) override these values.

app:
  name: "Enterprise Vision RAG"
  version: "0.1.0"

llm:
  router:
    primary_provider: ollama
    fallback_provider: groq
    request_timeout_seconds: 60
    max_retries: 2
    health_check_interval_seconds: 30
  ollama:
    base_url: "${OLLAMA_BASE_URL}"
    models:
      default: "qwen3:8b"
      reasoning: "deepseek-r1:8b"
      general: "llama3.3:8b"
      lightweight: "gemma3:4b"
    vision_models:
      default: "qwen2.5-vl:7b"
      lightweight: "gemma3:4b"
  groq:
    base_url: "${GROQ_BASE_URL}"
    api_key: "${GROQ_API_KEY}"
    model: "llama-3.3-70b-versatile"
  gemini:
    base_url: "${GEMINI_BASE_URL}"
    api_key: "${GEMINI_API_KEY}"
    model: "gemini-2.0-flash"

embeddings:
  provider: ollama
  ollama:
    base_url: "${OLLAMA_BASE_URL}"
    model: "bge-m3"
    dimension: 1024

parsing:
  provider: local        # local | llamaparse
  llamaparse:
    api_key: "${LLAMAPARSE_API_KEY}"
    result_type: "markdown"

ocr:
  provider: tesseract     # tesseract | surya | paddle
  fallback_provider: tesseract
  languages: ["eng"]

vision:
  enabled: true
  provider: ollama
  describe_figures: true
  describe_tables: true

chunking:
  strategy: recursive     # recursive | sentence_window | parent_child | semantic
  chunk_size: 1024
  chunk_overlap: 128
  sentence_window_size: 3

vector_db:
  provider: qdrant
  qdrant:
    url: "${QDRANT_URL}"
    api_key: "${QDRANT_API_KEY}"
    collection_name: "vision_rag_documents"
    distance: "cosine"

retrieval:
  mode: hybrid            # dense | bm25 | hybrid
  top_k: 8
  dense_weight: 0.6
  bm25_weight: 0.4
  rerank: true

reranker:
  provider: cross_encoder  # cross_encoder | none
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_n: 5

guardrails:
  input_validation: true
  output_validation: true
  prompt_injection_detection: true
  pii_detection: true
  secrets_detection: true
  toxicity_detection: true
  hallucination_check: true
  citation_validation: true
  max_input_chars: 8000

security:
  jwt_secret_key: "${JWT_SECRET_KEY}"
  jwt_algorithm: "${JWT_ALGORITHM}"
  jwt_expire_minutes: "${JWT_EXPIRE_MINUTES}"
  rate_limit_per_minute: 60

memory:
  conversation_backend: redis
  max_turns: 20

database:
  postgres_dsn: "${POSTGRES_DSN}"
  redis_url: "${REDIS_URL}"

observability:
  structured_logging: true
  tracing_enabled: false
  langfuse:
    public_key: "${LANGFUSE_PUBLIC_KEY}"
    secret_key: "${LANGFUSE_SECRET_KEY}"
    host: "${LANGFUSE_HOST}"
